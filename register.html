<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Bootstrap 5</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-10 col-sm-8 col-md-6 col-lg-5">
                <div class="card shadow border-0 rounded-3">
                    <div class="card-body p-4 p-sm-5">
                        <h3 class="card-title text-center mb-4 fw-bold">Create Account</h3>
                        
                        <form>
                            <!-- Full Name Input -->
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control" id="floatingName" placeholder="John Doe" required>
                                <label for="floatingName">Full Name</label>
                            </div>

                            <!-- Email Input -->
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com" required>
                                <label for="floatingEmail">Email address</label>
                            </div>
                            
                            <!-- Password Input -->
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" id="floatingPass" placeholder="Password" required>
                                <label for="floatingPass">Password</label>
                            </div>

                            <!-- Confirm Password Input -->
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" id="floatingConfirmPass" placeholder="Confirm Password" required>
                                <label for="floatingConfirmPass">Confirm Password</label>
                            </div>

                            <!-- Terms and Conditions Checkbox -->
                            <div class="form-check mb-4">
                                <input class="form-check-input" type="checkbox" value="" id="termsCheck" required>
                                <label class="form-check-label text-secondary small" for="termsCheck">
                                    I agree to the <a href="#" class="text-decoration-none">Terms & Conditions</a>
                                </label>
                            </div>

                            <!-- Submit Button -->
                            <button class="btn btn-success w-100 py-2 mb-3 fw-semibold" type="submit">Register</button>
                            
                            <!-- Login Link -->
                            <div class="text-center">
                                <p class="text-secondary small mb-0">Already have an account? <a href="login.html" class="text-decoration-none fw-semibold">Sign In</a></p>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle CDN -->
    <script src="https://jsdelivr.net"></script>
</body>
</html>
