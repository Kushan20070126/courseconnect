<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Bootstrap 5</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center justify-content-center vh-100">

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-10 col-sm-8 col-md-6 col-lg-4">
                <div class="card shadow border-0 rounded-3">
                    <div class="card-body p-4 p-sm-5">
                        <h3 class="card-title text-center mb-4 fw-bold">Sign In</h3>
                        
                        <form>
                            <!-- Email Input -->
                            <div class="form-floating mb-3">
                                <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com" required>
                                <label for="floatingInput">Email address</label>
                            </div>
                            
                            <!-- Password Input -->
                            <div class="form-floating mb-3">
                                <input type="password" class="form-control" id="floatingPassword" placeholder="Password" required>
                                <label for="floatingPassword">Password</label>
                            </div>

                            <!-- Remember Me & Forgot Password -->
                            <div class="d-flex justify-content-between align-items-center mb-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" value="" id="rememberMe">
                                    <label class="form-check-label text-secondary small" for="rememberMe">
                                        Remember me
                                    </label>
                                </div>
                                <a href="#" class="text-decoration-none small text-primary">Forgot password?</a>
                            </div>

                            <!-- Submit Button -->
                            <button class="btn btn-primary w-100 py-2 mb-3 fw-semibold" type="submit">Sign In</button>
                            
                            <!-- Register Link -->
                            <div class="text-center">
                                <p class="text-secondary small mb-0">Don't have an account? <a href="register.html" class="text-decoration-none fw-semibold">Register here</a></p>
                            </div>
                        </form>

                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle CDN -->
    <script src="https://jsdelivr.net"></script>
</body>
</html>
