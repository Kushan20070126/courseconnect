<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instructor Dashboard · CourseConnect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="session.css">
</head>
<body>

<div id="cc-nav"></div>

<main class="dash">
  <header class="dash-head">
    <div>
      <div class="eyebrow">Instructor console</div>
      <h1>Your teaching dashboard</h1>
      <p class="sub">Track enrollments, revenue, and manage your published courses.</p>
    </div>
    <a class="btn-submit" style="width:auto;text-decoration:none;" href="create-course.html">+ Create course</a>
  </header>

  <section class="dash-grid" id="statGrid">
    <div class="stat-card"><span class="stat-label">Courses</span><b class="stat-value" id="statCourses">–</b></div>
    <div class="stat-card"><span class="stat-label">Total students</span><b class="stat-value" id="statStudents">–</b></div>
    <div class="stat-card"><span class="stat-label">Paid courses</span><b class="stat-value" id="statPaid">–</b></div>
    <div class="stat-card accent"><span class="stat-label">Revenue</span><b class="stat-value" id="statRevenue">–</b></div>
  </section>

  <section class="panel" style="margin-top:22px;">
    <div class="panel-head"><h2>Your courses</h2><span class="badge-count" id="courseCount">0</span></div>
    <div class="table-wrap">
      <table class="dash-table">
        <thead><tr><th>Title</th><th>Status</th><th>Students</th><th>Price</th><th>Rating</th><th></th></tr></thead>
        <tbody id="courseRows"></tbody>
      </table>
      <p class="empty" id="emptyState" style="display:none;">No courses yet — create your first one!</p>
    </div>
  </section>

  <p class="dash-error" id="dashError" style="display:none;"></p>
</main>

<script src="env.js"></script>
<script src="auth.js"></script>
<script src="session.js"></script>
<script src="lecturer-dashboard.js"></script>
</body>
</html>
