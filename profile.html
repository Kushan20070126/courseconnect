<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Profile · CourseConnect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<style>
  .profile-wrap{ max-width:760px; margin:48px auto; padding:0 20px; }
  .profile-head{ display:flex; align-items:center; gap:18px; margin-bottom:28px; }
  .avatar{
    width:64px; height:64px; border-radius:50%;
    background:linear-gradient(135deg,var(--violet),var(--violet-deep));
    color:#fff; display:flex; align-items:center; justify-content:center;
    font:700 26px 'Space Grotesk',sans-serif; flex:0 0 auto;
  }
  .profile-head h1{ margin:0; font:600 24px 'Space Grotesk',sans-serif; }
  .profile-head p{ margin:4px 0 0; color:var(--ink-soft); }
  .badge{
    display:inline-block; padding:4px 12px; border-radius:999px; font-size:12px; font-weight:600;
    background:rgba(79,70,229,.12); color:var(--violet); text-transform:capitalize;
  }
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow-sm); padding:24px; margin-bottom:18px;
  }
  .card h3{ margin:0 0 16px; font:600 16px 'Space Grotesk',sans-serif; }
  .row{ display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px dashed var(--line); }
  .row:last-child{ border-bottom:none; }
  .row .k{ color:var(--ink-soft); }
  .row .v{ font-weight:600; }
  .actions{ display:flex; gap:12px; margin-top:8px; }
  .btn-ghost{
    border:1px solid var(--line); background:#fff; color:var(--ink); border-radius:10px;
    padding:11px 18px; font-weight:600; cursor:pointer; font-family:inherit;
  }
  .btn-ghost.danger{ color:var(--danger); border-color:rgba(229,72,77,.3); }
  .role-extras{ display:none; }
</style>
</head>
<body>

<div class="profile-wrap">
  <div class="profile-head">
    <div class="avatar" id="avatar">?</div>
    <div>
      <h1 id="pName">Loading…</h1>
      <p><span class="badge" id="pRole">—</span></p>
    </div>
  </div>

  <div class="card">
    <h3>Account details</h3>
    <div class="row"><span class="k">User ID</span><span class="v" id="pId">—</span></div>
    <div class="row"><span class="k">Email</span><span class="v" id="pEmail">—</span></div>
    <div class="row role-extras" id="rowAge"><span class="k">Age</span><span class="v" id="pAge">—</span></div>
  </div>

  <!-- Role-specific extras -->
  <div class="card role-extras" id="studentExtras">
    <h3>Student info</h3>
    <div class="row"><span class="k">Education level</span><span class="v" id="pEdu">—</span></div>
    <div class="row"><span class="k">Interest</span><span class="v" id="pInterest">—</span></div>
    <div class="row"><span class="k">Goal</span><span class="v" id="pGoal">—</span></div>
  </div>

  <div class="card role-extras" id="lecturerExtras">
    <h3>Lecturer info</h3>
    <div class="row"><span class="k">Title</span><span class="v" id="pTitle">—</span></div>
    <div class="row"><span class="k">Experience</span><span class="v" id="pExp">—</span></div>
    <div class="row"><span class="k">Area</span><span class="v" id="pArea">—</span></div>
  </div>

  <div class="card role-extras" id="adminExtras">
    <h3>Admin</h3>
    <div class="row"><span class="k">Privileges</span><span class="v">Full access</span></div>
  </div>

  <div class="actions">
    <button class="btn-ghost" id="homeBtn">Back to login</button>
    <button class="btn-ghost danger" id="logoutBtn">Log out</button>
  </div>
</div>

<script src="auth.js"></script>
<script src="profile.js"></script>
</body>
</html>
