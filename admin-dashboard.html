<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Console · CourseConnect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="session.css">
</head>
<body>

<div id="cc-nav"></div>

<main class="dash">
  <header class="dash-head">
    <div>
      <div class="eyebrow">Admin console</div>
      <h1>Platform overview</h1>
      <p class="sub">Live numbers and moderation queues straight from the auth service.</p>
    </div>
    <a class="dash-back" href="index.html">← Back to site</a>
  </header>

  <!-- ===== Stat cards ===== -->
  <section class="dash-grid" id="statGrid">
    <div class="stat-card">
      <span class="stat-label">Total users</span>
      <b class="stat-value" id="statUsers">–</b>
    </div>
    <div class="stat-card">
      <span class="stat-label">Students</span>
      <b class="stat-value" id="statStudents">–</b>
    </div>
    <div class="stat-card">
      <span class="stat-label">Lecturers</span>
      <b class="stat-value" id="statLecturers">–</b>
    </div>
    <div class="stat-card">
      <span class="stat-label">Courses</span>
      <b class="stat-value" id="statCourses">–</b>
    </div>
    <div class="stat-card accent">
      <span class="stat-label">Pending approvals</span>
      <b class="stat-value" id="statPending">–</b>
    </div>
  </section>

  <section class="dash-cols">
    <!-- ===== Recent users ===== -->
    <div class="panel">
      <div class="panel-head">
        <h2>Recent users</h2>
      </div>
      <div class="table-wrap">
        <table class="dash-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Role</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="userRows"></tbody>
        </table>
        <p class="empty" id="userEmpty" style="display:none;">No users yet.</p>
      </div>
    </div>

    <!-- ===== Lecturer approvals ===== -->
    <div class="panel">
      <div class="panel-head">
        <h2>Lecturer approvals</h2>
        <span class="badge-count" id="pendingCount">0</span>
      </div>
      <div class="approval-list" id="approvalList"></div>
      <p class="empty" id="approvalEmpty" style="display:none;">No lecturers awaiting approval. 🎉</p>
    </div>
  </section>

  <p class="dash-error" id="dashError" style="display:none;"></p>
</main>

<script src="env.js"></script>
<script src="auth.js"></script>
<script src="session.js"></script>
<script src="animations.js"></script>
<script src="admin-dashboard.js"></script>
</body>
</html>
